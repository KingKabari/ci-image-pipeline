name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Basic check
        run: echo "Code checked successfully"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-image-pipeline:latest .

      - name: Tag with commit SHA
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/ci-image-pipeline:latest \
          ${{ secrets.DOCKER_USERNAME }}/ci-image-pipeline:${{ github.sha }}

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-image-pipeline:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-image-pipeline:${{ github.sha }}
